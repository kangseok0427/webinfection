<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebInfection</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            transition: opacity 0.5s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-title {
            color: #0f0; font-size: 64px; margin-bottom: 40px;
            text-shadow: 0 0 20px #0f0; letter-spacing: 15px;
            text-align: center;
        }
        .play-btn {
            padding: 15px 60px; font-size: 28px;
            background: transparent; color: #0f0;
            border: 3px solid #0f0; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 10px #0f0;
            letter-spacing: 5px;
        }
        .play-btn:hover {
            background: #0f0; color: #000;
            box-shadow: 0 0 30px #0f0; transform: scale(1.1);
        }
        .instructions {
            margin-top: 30px; color: #0a0; font-size: 14px;
            text-align: center; line-height: 1.6;
        }
        #version {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #0f0;
            font-size: 12px;
            z-index: 101;
        }
    </style>
</head>
<body style="margin:0; overflow:hidden; font-family:monospace;">
    <div id="ui-overlay">
        <h1 id="game-title">WEB<br>INFECTION</h1>
        <button class="play-btn">PLAY</button>
        <div class="instructions">
            [ WAS ] TO MOVE<br>
            [ SPACE ] TO SHOOT<br>
            SURVIVE THE VIRUS
        </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <span id="version">Version 1.0</span>
    <script type="module" src="core.js"></script>
</body>
</html>
